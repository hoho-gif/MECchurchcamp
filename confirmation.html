<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教会キャンプ申し込み確認</title>
    <style>
        :root {
            --main-bg: #e8e5ce;
            --main-color: #333;
            --accent: #1976d2;
            --border-radius: 8px;
        }
        
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #faf9f6;
            color: var(--main-color);
            padding-bottom: 5rem;
        }
        
        header {
            background: var(--main-bg);
            padding: 2rem 0;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .section {
            background: #fff;
            border-radius: var(--border-radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .section h2 {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }
        
        .info-row {
            display: flex;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            min-width: 180px;
            color: #555;
        }
        
        .info-value {
            flex: 1;
            color: var(--main-color);
        }
        
        .applicant-block {
            background: #f7f6f2;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin: 1rem 0;
        }
        
        .applicant-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: #757575;
            color: #fff;
        }
        
        .btn-back:hover {
            background: #616161;
            transform: translateY(-2px);
        }
        
        .btn-submit {
            background: linear-gradient(90deg, #1976d2 60%, #42a5f5 100%);
            color: #fff;
        }
        
        .btn-submit:hover {
            background: linear-gradient(90deg, #1565c0 60%, #1976d2 100%);
            transform: translateY(-2px);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .meal-table {
            margin: 1rem 0;
            width: 100%;
            border-collapse: collapse;
        }
        
        .meal-table th,
        .meal-table td {
            padding: 0.5rem;
            border: 1px solid #ddd;
            text-align: center;
        }
        
        .meal-table th {
            background: var(--main-bg);
            font-weight: 600;
        }
        
        .meal-yes {
            color: #2e7d32;
            font-weight: bold;
        }
        
        .meal-no {
            color: #d32f2f;
        }
        
        .footer {
            background: var(--main-bg);
            padding: 1.5rem 0;
            text-align: center;
            font-size: 1.1rem;
            position: fixed;
            width: 100vw;
            left: 0;
            bottom: 0;
        }
        
        #loadingMessage {
            display: none;
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            margin: 1rem 0;
        }
        
        @media (max-width: 700px) {
            .info-row {
                flex-direction: column;
            }
            
            .info-label {
                margin-bottom: 0.3rem;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>教会キャンプ2026年 - 申し込み確認</header>
    
    <div class="container">
        <div class="section">
            <h2>申込者情報</h2>
            <div id="mainApplicantInfo"></div>
        </div>
        
        <div class="section">
            <h2>参加情報</h2>
            <div id="participationInfo"></div>
        </div>
        
        <div class="section" id="mealsSection" style="display:none;">
            <h2>食事・宿泊</h2>
            <div id="mealsInfo"></div>
        </div>
        
        <div id="additionalApplicants"></div>
        
        <div class="section">
            <h2>その他</h2>
            <div id="otherInfo"></div>
        </div>
        
        <div id="loadingMessage">送信中...</div>
        
        <div class="button-group">
            <button class="btn btn-back" onclick="goBack()">戻る</button>
            <button class="btn btn-submit" id="submitBtn" onclick="submitToGoogleSheets()">送信する</button>
        </div>
    </div>
    
    <footer class="footer"><a href="https://www.mitakachurch.com/">三鷹福音教会</a></footer>
    
    <script>
        // URLパラメータから申込データを取得
        function getFormData() {
            const params = new URLSearchParams(window.location.search);
            const data = {};
            for (const [key, value] of params.entries()) {
                data[key] = decodeURIComponent(value);
            }
            return data;
        }
        
        // メイン申込者情報を表示
        function displayMainApplicant(data) {
            const html = `
                <div class="info-row">
                    <div class="info-label">申込家族名</div>
                    <div class="info-value">${data['family-name'] || ''} (${data['family-kana'] || ''})</div>
                </div>
                <div class="info-row">
                    <div class="info-label">申込個人名</div>
                    <div class="info-value">${data['first-name'] || ''} (${data['first-kana'] || ''})</div>
                </div>
                <div class="info-row">
                    <div class="info-label">性別</div>
                    <div class="info-value">${data.gender === 'male' ? '男性' : '女性'}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">年齢</div>
                    <div class="info-value">${data.age || ''}歳</div>
                </div>
                <div class="info-row">
                    <div class="info-label">メールアドレス</div>
                    <div class="info-value">${data['email-address'] || ''}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">電話番号</div>
                    <div class="info-value">${data['phone-number'] || ''}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">郵便番号</div>
                    <div class="info-value">${data.zipcode || ''}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">住所</div>
                    <div class="info-value">${data.address || ''}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">番地</div>
                    <div class="info-value">${data.addressNum || ''}</div>
                </div>
            `;
            document.getElementById('mainApplicantInfo').innerHTML = html;
        }
        
        // 参加情報を表示
        function displayParticipation(data) {
            const entryTypeMap = {
                'new': '新規申し込み',
                'edit': '申し込み変更',
                'cancel': '全キャンセル'
            };
            
            const gobackMap = {
                'All': '全参加',
                'MiddleCameBack': '部分参加'
            };
            
            let html = `
                <div class="info-row">
                    <div class="info-label">申込種別</div>
                    <div class="info-value">${entryTypeMap[data.entryType] || ''}</div>
                </div>
            `;
            
            if (data.entryType !== 'cancel') {
                html += `
                    <div class="info-row">
                        <div class="info-label">参加状況</div>
                        <div class="info-value">${gobackMap[data.GOBACK] || ''}</div>
                    </div>
                `;
                
                if (data.GOBACK === 'MiddleCameBack') {
                    html += `
                        <div class="info-row">
                            <div class="info-label">参加日</div>
                            <div class="info-value">${data.startDate || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">到着時間</div>
                            <div class="info-value">${getMealTimeLabel(data['first-meal'])}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">帰宅日</div>
                            <div class="info-value">${data.endDate || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">帰宅時間</div>
                            <div class="info-value">${getMealTimeLabel(data['last-meal'])}</div>
                        </div>
                    `;
                }
            }
            
            document.getElementById('participationInfo').innerHTML = html;
        }
        
        function getMealTimeLabel(value) {
            const labels = {
                'brackfeast':      '朝食後',
                'lunch':           '昼食後',
                'dinner':          '夕食後',
                'afterdinner':     '夕食後',
                'beforbrackfeast': '朝食前'
            };
            return labels[value] || value;
        }
        
        // 食事・宿泊情報を表示
        function displayMeals(data) {
            if (data.entryType === 'cancel') {
                document.getElementById('mealsSection').style.display = 'none';
                return;
            }
            
            document.getElementById('mealsSection').style.display = 'block';
            
            let html = '<table class="meal-table"><thead><tr><th></th><th>○申し込む</th><th>×申し込まない</th></tr></thead><tbody>';
            
            // 日付をYYYY-MM-DD文字列のまま比較（タイムゾーンズレ回避）
            const startDateStr = data.startDate || '';
            const endDateStr   = data.endDate   || '';
            const firstMeal    = data['first-meal'] || 'lunch';
            const lastMeal     = data['last-meal']  || 'lunch';
            
            // 日付マッピング（文字列で管理）
            const dateMap = {
                1: { str: '2026-05-04', label: '5月4日' },
                2: { str: '2026-05-05', label: '5月5日' },
                3: { str: '2026-05-06', label: '5月6日' }
            };
            
            const allMeals = [];
            for (let dayIndex = 1; dayIndex <= 3; dayIndex++) {
                ['朝食', '昼食', '夕食', '宿泊'].forEach((mealType, mealOrder) => {
                    // 最終日の宿泊はスキップ
                    if (dayIndex === 3 && mealType === '宿泊') return;

                    // 全参加の場合：キャンプスケジュール外の食事はスキップ
                    // 5/4は昼食から（朝食はスキップ）、5/6は昼食まで（夕食・宿泊はスキップ）
                    if (data.GOBACK === 'All') {
                        if (dayIndex === 1 && mealType === '朝食') return; // 5/4朝食なし
                    }
                    
                    const key   = `${mealType}[${dayIndex}]`;
                    const value = data[key] || 'no';
                    
                    let isInRange = false;

                    if (data.GOBACK === 'All') {
                        isInRange = true;

                    } else if (data.GOBACK === 'MiddleCameBack' && startDateStr && endDateStr) {
                        const dayStr    = dateMap[dayIndex].str;
                        const inRange   = dayStr >= startDateStr && dayStr <= endDateStr;
                        const isStart   = dayStr === startDateStr;
                        const isEnd     = dayStr === endDateStr;

                        isInRange = inRange;

                        // 初日：到着時間より前の食事は範囲外
                        if (isStart) {
                            if (firstMeal === 'brackfeast' && mealType === '朝食') isInRange = false;
                            if (firstMeal === 'lunch'      && mealType === '朝食') isInRange = false;
                            if (firstMeal === 'dinner'     && (mealType === '朝食' || mealType === '昼食')) isInRange = false;
                            if (firstMeal === 'afterdinner'&& (mealType === '朝食' || mealType === '昼食' || mealType === '夕食')) isInRange = false;
                        }

                        // 最終日：帰宅時間より後の食事は範囲外
                        if (isEnd) {
                            if (lastMeal === 'beforbrackfeast') isInRange = false;
                            if (lastMeal === 'brackfeast' && (mealType === '昼食' || mealType === '夕食' || mealType === '宿泊')) isInRange = false;
                            if (lastMeal === 'lunch'      && (mealType === '夕食' || mealType === '宿泊')) isInRange = false;
                            if (lastMeal === 'dinner'     &&  mealType === '宿泊') isInRange = false;
                        }
                    }
                    
                    allMeals.push({
                        label:   `${dateMap[dayIndex].label}${mealType}`,
                        value:   value,
                        isBold:  mealType === '宿泊',
                        isInRange
                    });
                });
            }
            
            // テーブル行を生成
            allMeals.forEach(item => {
                const isYes = item.value === 'yes';
                const isNo  = item.value === 'no';
                
                // 範囲外 かつ ×の行はグレー
                const rowStyle   = (!item.isInRange && isNo)  ? ' style="background:#f5f5f5;"' : '';
                const labelStyle = (!item.isInRange && isNo)  ? ' style="color:#999;"'         : '';
                const labelCell  = item.isBold ? `<b>${item.label}</b>` : item.label;
                
                html += `<tr${rowStyle}>
                    <td${labelStyle}>${labelCell}</td>
                    <td>${isYes ? '<span class="meal-yes">○</span>' : ''}</td>
                    <td>${isNo  ? '<span class="meal-no">×</span>'  : ''}</td>
                </tr>`;
            });
            
            if (allMeals.length === 0) {
                html += '<tr><td colspan="3">食事・宿泊情報がありません</td></tr>';
            }
            
            html += '</tbody></table>';
            document.getElementById('mealsInfo').innerHTML = html;
        }
        
        // 追加申込者を表示
        function displayAdditionalApplicants(data) {
            let html = '';
            let count = 1;
            
            for (let i = 4; i <= 14; i++) {
                if (data[`first-name${i}`]) {
                    html += `
                        <div class="section">
                            <h2>追加申込者 ${count}</h2>
                            <div class="applicant-block">
                                <div class="applicant-title">${data[`first-name${i}`]} (${data[`first-kana${i}`] || ''})</div>
                                <div class="info-row">
                                    <div class="info-label">性別</div>
                                    <div class="info-value">${data[`gender${i}`] === 'male' ? '男性' : '女性'}</div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label">年齢</div>
                                    <div class="info-value">${data[`age${i}`] || ''}歳</div>
                                </div>
                                <div style="margin-top:1rem;">
                                    <strong>食事:</strong><br>
                                    朝食: ${data[`breakfast${i}`] === 'yes' ? '<span class="meal-yes">○</span>' : '<span class="meal-no">×</span>'} | 
                                    昼食: ${data[`lunch${i}`] === 'yes' ? '<span class="meal-yes">○</span>' : '<span class="meal-no">×</span>'} | 
                                    夕食: ${data[`dinner${i}`] === 'yes' ? '<span class="meal-yes">○</span>' : '<span class="meal-no">×</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                    count++;
                }
            }
            
            document.getElementById('additionalApplicants').innerHTML = html;
        }
        
        // その他情報を表示
        function displayOther(data) {
            const html = `
                <div class="info-row">
                    <div class="info-label">アレルギー</div>
                    <div class="info-value">${data.Allergy || 'なし'}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">その他</div>
                    <div class="info-value">${data.Others || 'なし'}</div>
                </div>
            `;
            document.getElementById('otherInfo').innerHTML = html;
        }
        
        // 戻るボタン
        function goBack() {
            window.location.href = 'churchCampApplication.html';
        }
        
        // Googleスプレッドシートに送信
        async function submitToGoogleSheets() {
            const data = getFormData();
            const submitBtn = document.getElementById('submitBtn');
            const loadingMsg = document.getElementById('loadingMessage');
            
            submitBtn.disabled = true;
            loadingMsg.style.display = 'block';
            
            // Google Apps ScriptのウェブアプリURLをここに設定
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2m74Ncqbqyhus6dLA-y52iJMeMoffc1iTpOA5Hrh_OOGGXPaz8outB-qCC0_Bor2o/exec';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                // no-corsモードでは成功判定できないため、一定時間後に成功とみなす
                setTimeout(() => {
                    loadingMsg.style.display = 'none';
                    // 完了ページに遷移
                    window.location.href = 'complete.html';
                }, 1500);
                
            } catch (error) {
                console.error('Error:', error);
                loadingMsg.style.display = 'none';
                alert('送信中にエラーが発生しました。もう一度お試しください。');
                submitBtn.disabled = false;
            }
        }
        
        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', () => {
            const data = getFormData();
            displayMainApplicant(data);
            displayParticipation(data);
            displayMeals(data);
            displayAdditionalApplicants(data);
            displayOther(data);
        });
    </script>
</body>
</html>
