<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>教会キャンプ申し込みフォーム</title>
    <link rel="stylesheet" href="htmlstyle.css">
</head>

<body>
    <header>教会キャンプ2026年</header>
    <main>
        <div class="side"></div>
        <section class="center">
            <form autocomplete="on">
                <label for="family-name">申込家族名<span class="required">*</span></label>
                <input type="text" id="family-name" name="family-name" maxlength="50" placeholder="田中" required>
                <label for="family-kana">申込家族名（ふりがな）<span class="required">*</span></label>
                <input type="text" id="family-kana" name="family-kana" maxlength="50" placeholder="たなか" required>
                <label for="first-name">申込個人名<span class="required">*</span></label>
                <input type="text" id="first-name" name="first-name" maxlength="50" placeholder="太郎" required>
                <label for="first-kana">申込個人名（ふりがな）<span class="required">*</span></label>
                <input type="text" id="first-kana" name="first-kana" maxlength="50" placeholder="たろう" required>
            </form>
            <form>
                <label>性別<span class="required">*</span></label>
                <label><input type="radio" name="gender" value="male" required> 男性</label>
                <label><input type="radio" name="gender" value="female"> 女性</label>
            </form>
            <form>
                <label for="birthday">生年月日<span class="required">*</span></label>
                <input type="date" name="birthday" id="birthday" value="2000-01-01" required>
            </form>
            <form>
                <label for="age">年齢<span class="required">*</span></label>
                <input type="number" name="age" id="age" value="26" max="120" required>
                <span id="ageAtCamp" style="margin-left:10px; color:var(--accent);"></span>
            </form>
            <form autocomplete="on">
                <label for="email-address">メールアドレス<span class="required">*</span></label>
                <input type="email" id="email-address" name="email-address" placeholder="xxxx@example.com" required>
            </form>
            <form form autocomplete="on">
                <label for="zipcode">郵便番号<span class="required">*</span></label>
                <input type="text" id="zipcode" name="zipcode" placeholder="1800013" pattern="\d{7}" required>
                <label for="address">住所<span class="required">*</span></label>
                <input type="text" id="address" name="address" placeholder="東京都武蔵野市西久保" required>
                <label for="addressNum">番地<span class="required">*</span></label>
                <input type="text" id="addressNum" name="addressNum" placeholder="1-12-2" required>
                <label for="GOBACK">参加状況を教えてください<span class="required">*</span></label>
                <select name="GOBACK" id="GOBACK" required>
                    <option value="none">参加状況を選択してください</option>
                    <option value="All">全参加</option>
                    <option value="MiddleCameBack">部分参加</option>
                </select>
            </form>
            <form>
                <div id="partialFields">
                    <label for="startDate">参加日<span class="required">*</span></label>
                    <input type="date" id="startDate" value="2026-05-04" min="2026-05-04" max="2026-05-06" required>
                    <label id="first-meal-label" for="first-meal">到着時間を教えてください<span class="required">*</span></label>
                    <select name="first-meal" id="first-meal" required></select>
                    <label for="endDate">帰宅日<span class="required">*</span></label>
                    <input type="date" id="endDate" value="2026-05-06" min="2026-05-04" max="2026-05-06" required>
                    <label id="last-meal-label" for="last-meal">帰宅時間を教えてください<span class="required">*</span></label>
                    <select name="last-meal" id="last-meal" required></select>
                    <div id="whichFoodStay">
                        <p>どの食事を申し込みますか？ <span class="required">*</span></p>
                        <div id="dynamicMealTable"></div>
                    </div>
                </div>
                <div id="partialFields2">
                    <p style="text-align:center; font-weight:bold; color:var(--accent);">
                        キャンプ期間：2026年5月04日:朝食後～2026年5月06日:昼食後
                    </p>
                    <form id="allJoinFoodStay">
                        <div id="allJoinMealTable"></div>
                    </form>
                </div>
                <div id="entryTypeGroup" class="entry-radio-group">
                    <label class="entry-radio"><input type="radio" name="entryType" id="radio-new" value="new"
                            checked><span>新規申し込み</span></label>
                    <label class="entry-radio"><input type="radio" name="entryType" id="radio-edit"
                            value="edit"><span>申し込み変更</span></label>
                    <label class="entry-radio"><input type="radio" name="entryType" id="radio-cancel"
                            value="cancel"><span>全キャンセル</span></label>
                </div>
                <div id="partialFields3" style="display:none; margin:1em 0;">
                    <p>同上の参加日数の申込者を増やしますか？</p>
                    <button type="button" onclick="addpeople()" value="AddPeople" class="modern-btn"
                        style="margin-bottom:0.5em;">
                        <svg viewBox="0 0 20 20">
                            <circle cx="10" cy="10" r="9" stroke="white" stroke-width="2" fill="none" />
                            <line x1="10" y1="5" x2="10" y2="15" stroke="white" stroke-width="2" />
                            <line x1="5" y1="10" x2="15" y2="10" stroke="white" stroke-width="2" />
                        </svg>
                        申込者を増やす
                    </button>
                    <button type="button" onclick="rempeople()" value="RemPeople" class="modern-btn"
                        style="background:linear-gradient(90deg,#d32f2f 60%,#ff5252 100%);margin-left:0.7em;margin-bottom:0.5em;">
                        <svg viewBox="0 0 20 20">
                            <circle cx="10" cy="10" r="9" stroke="white" stroke-width="2" fill="none" />
                            <line x1="5" y1="10" x2="15" y2="10" stroke="white" stroke-width="2" />
                        </svg>
                        申込者を減らす
                    </button>
                </div>
                <!-- extra applicants will be generated here by JS -->
                <div id="extraApplicants"></div>
                <label for="Allergy">アレルギー（可能な限り対応させていただきます）</label>
                <input type="text" id="Allergy" name="Allergy" maxlength="200" placeholder="例：卵、乳、小麦アレルギー">
                <label for="Others">その他</label>
                <p>その他宿泊の希望内容があればご記入ください（※ご希望に添いかねる場合もありますので、あらかじめご了承ください）</p>
                <input type="text" id="Others" name="Others" maxlength="200" placeholder="その他連絡事項など"><br>
            </form>
            <button type="button" onclick="nextpage()" value="nextpage" class="modern-btn"
                style="width:100%;margin-top:1.5em;font-size:1.15em;">
                <svg viewBox="0 0 20 20">
                    <path d="M2 10l16-7-7 16-2-7-7-2z" fill="white" />
                </svg>
                次へ進む
            </button>
        </section>
        <div class="side"></div>
    </main>
    <footer class="footer"><a href="https://www.mitakachurch.com/">三鷹福音教会</a></footer>
    <script src="makeForm.js"></script>
</body>

</html>
